# Area Labels (actions/labeler@v5 Schema)
# Docs: https://github.com/actions/labeler

"area:algorithms":
  - changed-files:
    - any-glob-to-any-file: 
      - "mcp_core/algorithms/**/*"
      - "tests/algorithms/**/*"

"area:tools":
  - changed-files:
    - any-glob-to-any-file:
      - "mcp_core/tools/**/*"
      - "mcp_core/tools/dynamic/**/*"

"area:documentation":
  - changed-files:
    - any-glob-to-any-file:
      - "docs/**/*"
      - "README.md"
      - "ARCHITECTURE.md"

"area:ci-cd":
  - changed-files:
    - any-glob-to-any-file:
      - ".github/workflows/**/*"
      - ".github/labeler.yml"

"area:core":
  - changed-files:
    - any-glob-to-any-file:
      - "mcp_core/*.py"
      - "orchestrator.py"
      - "server.py"
