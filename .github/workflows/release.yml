name: Release Management

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          echo "## Release $VERSION" > notes.txt
          echo "" >> notes.txt
          # Pull the section from CHANGELOG.md for this version
          sed -n "/## \[$VERSION\]/,/## /p" CHANGELOG.md | sed '$d' >> notes.txt
          if [ ! -s notes.txt ]; then
            echo "No entry found in CHANGELOG.md for $VERSION. Manual update recommended." >> notes.txt
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
