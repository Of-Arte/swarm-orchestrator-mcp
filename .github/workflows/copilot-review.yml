name: Algorithm Review Request

on:
  pull_request:
    paths:
      - 'mcp_core/algorithms/**'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Request Algorithmic Review
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const reviewers = []; // Add reviewers here as needed
              if (reviewers.length > 0) {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  reviewers: reviewers
                });
              } else {
                console.log("No algorithmic reviewers specified, skipping automatic request.");
              }
            } catch (error) {
              console.warn("Failed to request reviewers:", error.message);
            }
